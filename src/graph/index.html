<!doctype html>
<html lang="en" data-theme="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Architeezy Graph</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/detail.css" />
    <link rel="stylesheet" href="css/graph.css" />
    <link rel="stylesheet" href="css/table.css" />
    <link rel="stylesheet" href="css/loading.css" />
    <link rel="stylesheet" href="css/tooltip.css" />

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/cytoscape@3.33.1/dist/cytoscape.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@dagrejs/dagre@2.0.0/dist/dagre.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"
    ></script>
    <script defer src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"
    ></script>
  </head>
  <body>
    <!-- ── LOADING ──────────────────────────────────────────────── -->
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text" data-i18n="loadingModels">Loading model list…</div>
    </div>

    <!-- ── ERROR (full-screen, initial load only) ────────────────── -->
    <div id="error-msg">
      <h2 data-i18n="errorTitle">Error</h2>
      <p id="error-detail"></p>
      <button id="retry-btn" data-i18n="retryBtn">Retry</button>
    </div>

    <!-- ── TOAST (non-fatal, dismissible) ───────────────────────── -->
    <div id="toast" class="error-toast notification access-denied login-required">
      <span id="toast-msg"></span>
      <button id="toast-close">✕</button>
    </div>

    <!-- ── NO RESULTS HINT ─────────────────────────────────────────────── -->
    <div
      class="no-results-hint hidden"
      data-i18n="noResultsHint"
      style="
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: #fff;
        border: 1px solid #ccc;
        padding: 10px 16px;
        border-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        z-index: 1000;
        font-size: 0.9rem;
        color: #666;
      "
    ></div>

    <!-- ── MODEL SELECTOR MODAL ─────────────────────────────────── -->
    <div id="model-modal" class="modal-overlay hidden" tabindex="-1">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" data-i18n="modalTitle">Select Model</span>
          <button id="modal-close-btn" class="modal-close">✕</button>
        </div>
        <div class="modal-search-wrap">
          <input
            id="model-search"
            class="modal-search"
            type="text"
            data-i18n-ph="modalSearchPh"
            data-i18n-label="modalSearchLabel"
            aria-label="Search models"
            placeholder="Search by name or type…"
          />
        </div>
        <div class="modal-body" id="model-list">
          <div class="model-list-loading" data-i18n="modalLoading">Loading list…</div>
        </div>
      </div>
    </div>

    <!-- ── HEADER ───────────────────────────────────────────────── -->
    <header>
      <nav class="breadcrumb">
        <a class="crumb-link" href="../">Architeezy Apps</a>
        <span class="crumb-sep">›</span>
        <button class="crumb-btn" id="current-model-btn">Graph</button>
        <span class="crumb-sep">›</span>
        <button class="crumb-btn" id="drill-exit-btn">
          <span id="current-model-name" data-i18n="selectModel">Select model…</span>
        </button>
        <span class="crumb-sep hidden" id="crumb-entity-sep">›</span>
        <span class="crumb-entity hidden" id="drill-label"></span>
      </nav>

      <div class="header-right">
        <!-- Global Search -->
        <div
          class="search-wrapper"
          style="position: relative; display: inline-block; margin-right: 12px"
        >
          <input
            type="text"
            id="global-search"
            class="global-search"
            data-i18n-ph="globalSearchPh"
            data-i18n-label="globalSearchLabel"
          />
          <button
            id="global-search-clear"
            class="global-search-clear"
            type="button"
            data-i18n-tt="globalSearchClear"
            data-i18n-label="globalSearchClear"
          >
            ×
          </button>
        </div>

        <div class="tab-group">
          <button class="tab-btn active" id="tab-graph" data-view="graph" data-i18n="tabGraph">
            Graph
          </button>
          <button class="tab-btn" id="tab-table" data-view="table" data-i18n="tabTable">
            Table
          </button>
        </div>

        <div class="theme-switcher">
          <button
            class="theme-btn"
            id="theme-btn-dark"
            data-theme="dark"
            data-i18n-tt="themeDark"
            title="Dark"
          >
            🌙
          </button>
          <button
            class="theme-btn"
            id="theme-btn-light"
            data-theme="light"
            data-i18n-tt="themeLight"
            title="Light"
          >
            ☀️
          </button>
          <button
            class="theme-btn"
            id="theme-btn-system"
            data-theme="system"
            data-i18n-tt="themeSystem"
            title="System"
          >
            🖥
          </button>
        </div>

        <div id="auth-area">
          <button class="ctrl" id="auth-btn" data-i18n="signIn">Sign in</button>
          <div id="user-info">
            <span id="user-name"></span>
            <button class="ctrl" id="signout-btn" data-i18n="signOut">Sign out</button>
          </div>
        </div>
      </div>
    </header>

    <!-- ── BODY ─────────────────────────────────────────────────── -->
    <div class="body">
      <aside id="graph-sidebar">
        <button
          id="sidebar-collapse-btn"
          class="sidebar-toggle"
          title="Hide sidebar"
          aria-expanded="true"
        >
          ‹
        </button>

        <div class="sidebar-scroll">
          <div class="sidebar-section">
            <div class="sidebar-header">
              <button class="sidebar-toggle-btn" data-section="sec-elem" aria-expanded="true">
                <span class="sidebar-header-title" data-i18n="sectionElements">Entities</span>
                <span class="sidebar-count-badge" id="badge-elem"></span>
                <span class="toggle-icon" id="icon-sec-elem">▼</span>
              </button>
              <div class="sidebar-header-actions">
                <button
                  class="filter-icon-btn"
                  data-action="select-all"
                  data-kind="elem"
                  data-i18n-tt="filterAll"
                  title="Select all"
                >
                  ✓
                </button>
                <button
                  class="filter-icon-btn"
                  data-action="select-none"
                  data-kind="elem"
                  data-i18n-tt="filterNone"
                  title="Select none"
                >
                  ✗
                </button>
              </div>
            </div>
            <div class="sidebar-content" id="sec-elem">
              <input
                id="elem-filter-search"
                class="filter-search"
                type="text"
                data-i18n-ph="filterSearchPh"
                data-i18n-label="elemSearchLabel"
                aria-label="Search entities"
                placeholder="Search…"
              />
              <div class="filter-show-all-wrap">
                <label class="filter-show-all-label">
                  <input type="checkbox" id="elem-show-all" class="filter-show-all" />
                  <span data-i18n="showAll">Show all</span>
                </label>
              </div>
              <div class="filter-list" id="elem-filter-list"></div>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-header">
              <button class="sidebar-toggle-btn" data-section="sec-rel" aria-expanded="true">
                <span class="sidebar-header-title" data-i18n="sectionRelations">Relationships</span>
                <span class="sidebar-count-badge" id="badge-rel"></span>
                <span class="toggle-icon" id="icon-sec-rel">▼</span>
              </button>
              <div class="sidebar-header-actions">
                <button
                  class="filter-icon-btn"
                  data-action="select-all"
                  data-kind="rel"
                  data-i18n-tt="filterAll"
                  title="Select all"
                >
                  ✓
                </button>
                <button
                  class="filter-icon-btn"
                  data-action="select-none"
                  data-kind="rel"
                  data-i18n-tt="filterNone"
                  title="Select none"
                >
                  ✗
                </button>
              </div>
            </div>
            <div class="sidebar-content" id="sec-rel">
              <input
                id="rel-filter-search"
                class="filter-search"
                type="text"
                data-i18n-ph="filterSearchPh"
                data-i18n-label="relSearchLabel"
                aria-label="Search relationships"
                placeholder="Search…"
              />
              <div class="filter-show-all-wrap">
                <label class="filter-show-all-label">
                  <input type="checkbox" id="rel-show-all" class="filter-show-all" />
                  <span data-i18n="showAll">Show all</span>
                </label>
              </div>
              <div class="filter-list" id="rel-filter-list"></div>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-header">
              <button class="sidebar-toggle-btn" data-section="sec-detail" aria-expanded="true">
                <span class="sidebar-header-title" data-i18n="sectionDetail">Details</span>
                <span class="toggle-icon" id="icon-sec-detail">▼</span>
              </button>
            </div>
            <div class="sidebar-content sidebar-detail-content" id="sec-detail">
              <div id="detail-panel">
                <div class="detail-empty" data-i18n="detailEmpty">Click a node to view details</div>
              </div>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-header">
              <button class="sidebar-toggle-btn" data-section="sec-settings" aria-expanded="true">
                <span class="sidebar-header-title" data-i18n="sectionSettings">Settings</span>
                <span class="toggle-icon" id="icon-sec-settings">▼</span>
              </button>
            </div>
            <div class="sidebar-content" id="sec-settings">
              <div class="settings-row">
                <label class="settings-label" for="layout-select" data-i18n="settingsLayout"
                  >Layout</label
                >
                <select class="ctrl sidebar-ctrl" id="layout-select">
                  <option value="fcose" selected>fCoSE</option>
                  <option value="dagre">Dagre</option>
                  <option value="cose">CoSE</option>
                  <option value="breadthfirst">Breadthfirst</option>
                  <option value="grid">Grid</option>
                  <option value="circle">Circle</option>
                </select>
              </div>
              <div class="settings-row">
                <label class="settings-label" for="containment-select" data-i18n="settingsNesting"
                  >Nesting</label
                >
                <select class="ctrl sidebar-ctrl" id="containment-select">
                  <option value="none" data-i18n="cnNone">none</option>
                  <option value="edge" data-i18n="cnEdge">edges ◆</option>
                  <option value="compound" data-i18n="cnCompound">shapes ⬚</option>
                </select>
              </div>
              <div class="settings-row" id="settings-depth-row">
                <span class="settings-label" data-i18n="settingsDepth">Link depth</span>
                <div class="depth-picker" id="depth-picker"></div>
              </div>
              <div class="settings-row">
                <label class="settings-label" for="legend-toggle" data-i18n="settingsLegend"
                  >Legend</label
                >
                <input type="checkbox" id="legend-toggle" class="sidebar-ctrl" />
              </div>
              <div class="settings-row">
                <label class="settings-label" for="highlight-toggle" data-i18n="settingsHighlight"
                  >Highlight</label
                >
                <input type="checkbox" id="highlight-toggle" class="sidebar-ctrl" />
              </div>
              <div class="settings-row">
                <label class="settings-label" for="tooltips-toggle" data-i18n="settingsTooltips"
                  >Tooltips</label
                >
                <input type="checkbox" id="tooltips-toggle" class="sidebar-ctrl" />
              </div>
            </div>
          </div>
        </div>
      </aside>

      <main>
        <div id="cy" class="hidden"></div>
        <div id="graph-legend" class="hidden"></div>
        <div id="empty-state-message" class="empty-state-message hidden" data-i18n="noElements">
          <p>This model contains no elements.</p>
        </div>

        <div id="table-view">
          <div class="table-header">
            <div class="table-tabs">
              <button
                class="table-tab-btn active"
                id="ttab-elements"
                data-tab="elements"
                data-i18n="ttabElements"
              >
                Elements
              </button>
              <button
                class="table-tab-btn"
                id="ttab-rels"
                data-tab="relationships"
                data-i18n="ttabRelations"
              >
                Relationships
              </button>
            </div>
            <div class="table-toolbar">
              <button id="export-csv-btn" class="ctrl" disabled>CSV</button>
            </div>
          </div>
          <div class="table-container">
            <table>
              <thead id="table-head"></thead>
              <tbody id="table-body"></tbody>
            </table>
            <div
              id="no-results"
              class="no-results-message hidden"
              style="text-align: center; padding: 40px 20px; color: var(--text-muted)"
            >
              <p style="font-size: 1rem; margin: 0 0 8px 0">No results found</p>
              <p style="font-size: 0.85rem; margin: 0; opacity: 0.8">
                Try adjusting your search or filters
              </p>
            </div>
          </div>
        </div>

        <div id="cy-controls" class="cy-controls">
          <button id="zoom-in-btn" data-i18n-tt="zoomIn" title="Zoom in">+</button>
          <button id="zoom-out-btn" data-i18n-tt="zoomOut" title="Zoom out">−</button>
          <button id="fit-cy-btn" data-i18n-tt="zoomFit" title="Fit">⤢</button>
          <button id="refresh-layout-btn" data-i18n-tt="refreshLayout" title="Refresh layout">
            ↻
          </button>

          <!-- Export Image Controls -->
          <div id="export-controls" class="export-controls">
            <button id="export-image-btn" class="ctrl" data-i18n-tt="export">📤</button>
            <div id="export-dropdown" class="dropdown hidden">
              <button id="export-png-btn" class="dropdown-item">PNG</button>
              <button id="export-svg-btn" class="dropdown-item">SVG</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div id="node-tooltip" class="node-tooltip"></div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
